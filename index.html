<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor Tools</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <nav class="tabs">
      <button class="tab active" data-tab="crop">Crop 9:16 → 4:5</button>
      <button class="tab" data-tab="stitch">Hook Stitch</button>
    </nav>

    <!-- CROP PANEL -->
    <div id="crop-panel" class="tab-panel">
      <div id="drop-zone" class="drop-zone">
        <span class="drop-icon">🎬</span>
        <p>Drop videos here</p>
        <p class="hint">or click to browse — multiple files OK</p>
        <input type="file" id="file-input" accept=".mp4,.mov,.mkv" multiple hidden>
      </div>
      <ul id="queue-list"></ul>
    </div>

    <!-- STITCH PANEL -->
    <div id="stitch-panel" class="tab-panel hidden">
      <p class="panel-sub">Upload a base video and all your hooks. Get one stitched file per hook.</p>

      <div class="stitch-block">
        <p class="stitch-label">BASE VIDEO</p>
        <div id="base-drop" class="mini-drop">
          <span id="base-drop-text">Drop base video or click</span>
          <input type="file" id="base-input" accept=".mp4,.mov,.mkv" hidden>
        </div>
      </div>

      <div class="stitch-block">
        <p class="stitch-label">HOOKS</p>
        <div id="hooks-drop" class="mini-drop">
          <span id="hooks-drop-text">Drop all hooks here or click</span>
          <p class="hint" id="hooks-hint">They'll be numbered in the order you select them</p>
          <input type="file" id="hooks-input" accept=".mp4,.mov,.mkv" multiple hidden>
        </div>
        <ul id="hooks-list"></ul>
      </div>

      <button id="stitch-btn" class="btn-stitch" disabled>Stitch All</button>
      <ul id="stitch-queue"></ul>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mp4box@0.5.2/dist/mp4box.all.min.js"></script>
  <script src="mp4-muxer.js?v=2"></script>
  <script type="module" src="app.js?v=11"></script>
</body>
</html>
