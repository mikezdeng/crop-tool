<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crop Tool — 9:16 to 4:5</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>9:16 → 4:5</h1>
    <p class="subtitle">Drop videos, get 4:5 versions. Multiple files OK.</p>

    <div id="drop-zone" class="drop-zone">
      <span class="drop-icon">🎬</span>
      <p>Drop videos here</p>
      <p class="hint">or click to browse</p>
      <input type="file" id="file-input" accept=".mp4,.mov,.mkv" multiple hidden>
    </div>

    <div id="loading-section" class="section hidden">
      <p>Loading FFmpeg... <span class="hint">(first time only, ~20s)</span></p>
      <div class="progress-bar"><div id="load-bar" class="bar bar-pulse"></div></div>
    </div>

    <ul id="queue-list"></ul>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      });
    }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
